# Sunucu Ayarları
server.port=8080

# Veritabanı Ayarları
spring.datasource.url=jdbc:mysql://localhost:3306/akilli_bina_db?useSSL=false&serverTimezone=Europe/Istanbul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Checksum doğrulamasını devre dışı bırak (migration dosyaları sonradan düzenlendi)
spring.flyway.validate-on-migrate=false

# JWT Ayarları
app.jwt.secret=AkillibinaVeEnerjiYonetimSistemiNMUBilgisayarMuhendisligi2026SecretKey
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Loglama
logging.level.com.akillibina=INFO
logging.level.org.springframework.security=WARN
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
